name: Check Styling and Build

on:
  push:
    branches: ["**"]
    paths:
      - "src/**"
      - "gradle.properties"
      - "build.gradle"
      - "MultiVersion"
      - ".gitmodules"
      - ".github/workflows/build.yml"
    tags-ignore: ["**"]

jobs:
  check-and-build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v4.0.0
        with:
          distribution: "temurin"
          java-version: 21

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"

      - name: Cache IntelliJ IDEA
        uses: actions/cache@v5
        with:
          path: /home/runner/work/_temp/_github_workflow/idea-cache
          key: ${{ runner.os }}-idea-cache

      - name: Format with IntelliJ IDEA
        uses: notdevcody/intellij-format-action@1704ffb57e311164f98c06b009f4736e11a1b6c3
        with:
          idea-version: "2025.3"
          include-glob: "./src/**/*.java"
          style-settings-file: "./style/IntelliJ IDEA.xml"
          push-type: "none"
          mute-formatter-output: true
          fail-on-changes: false

      - name: Check diff
        run: git --no-pager diff --exit-code

      - name: Mark executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build