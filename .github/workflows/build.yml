name: Lint and Build

on:
  push:
    branches: ["**"]
    paths:
      - "src/**"
      - "gradle.properties"
      - "build.gradle"
      - "MultiVersion"
      - ".gitmodules"
      - ".github/workflows/build.yml"
    tags-ignore: ["**"]

jobs:
  lint-and-build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          submodules: true

      - name: Super-linter
        uses: super-linter/super-linter@v8.3.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4.0.0
        with:
          distribution: "temurin"
          java-version: 21

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "18.17.0"

      - name: Mark Executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build