name: Check Styling and Build

on:
  push:
    branches: ["**"]
    paths:
      - "src/**"
      - "gradle.properties"
      - "build.gradle"
      - "MultiVersion"
      - ".gitmodules"
      - ".github/workflows/build.yml"
    tags-ignore: ["**"]

jobs:
  check-and-build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v4.0.0
        with:
          distribution: "temurin"
          java-version: 21

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.12.0"

      - name: Cache IntelliJ IDEA
        uses: actions/cache@v5
        with:
          path: /github/workflow/idea-cache
          key: idea-cache

      - name: Format with IntelliJ IDEA
        uses: gXLg/intellij-idea-format@0df08676ddafbae939f7d675a5e3b02e6c343a29

      - name: Mark executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build